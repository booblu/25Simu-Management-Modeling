name: Project 2 Active LP grading CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: CI Rule 1 - 必须移植 P1 引擎
      run: |
        if [ ! -f "src/simulator.py" ]; then
          echo "❌ 失败: 没有找到从 P1 拷贝过来的 simulator.py"
          exit 1
        fi
    - name: CI Rule 2 - 极压测试跑通 (Milestone 1 真实验证)
      run: |
        python -m pytest tests/test_milestone_1.py -v
    - name: CI Rule 3 - 验证回测报告生成
      run: |
        # 我们假设你的跑批会输出一张 metrics.csv 或者直接成功 exit 0
        python experiments/run_backtest.py
